name: hcdcx_ai_plus
description: HCDC-X AI+ Mobile App - Adaptive Secure HybridColor Dynamic Code Platform
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Camera & Scanning
  camera: ^0.11.0
  mobile_scanner: ^5.1.1
  image_picker: ^1.1.2

  # Barcode/QR Generation
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  # Authentication
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.4
  google_sign_in: ^6.2.1

  # Analytics & Charts
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^25.2.7

  # Maps
  google_maps_flutter: ^2.7.0
  location: ^6.0.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  mockito: ^5.4.4

# Flutter configurations
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500

# Native Splash Screen
flutter_native_splash:
  color: "#000000"
  image: assets/images/splash_logo.png
  branding: assets/images/branding.png
  color_dark: "#000000"
  image_dark: assets/images/splash_logo.png
  branding_dark: assets/images/branding.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#000000"
    image_dark: assets/images/splash_logo.png
    icon_background_color_dark: "#000000"

# Launcher Icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
